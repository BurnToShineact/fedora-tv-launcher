<!doctype html>
<html lang="ru">
<head><meta charset="UTF-8"><style>
  *{box-sizing:border-box}html,body{margin:0;background:transparent;font-family:system-ui,sans-serif}
  button{width:100%;height:58px;border:1px solid rgba(255,255,255,.28);border-radius:22px;background:rgba(20,27,36,.92);color:#fff;font-size:17px;font-weight:750;box-shadow:0 14px 40px rgba(0,0,0,.42);backdrop-filter:blur(18px);cursor:pointer}
  button:focus{outline:4px solid #fff;outline-offset:-5px}
</style></head>
<body><button id="home" autofocus>← Fedora TV</button><script>document.getElementById('home').addEventListener('click',()=>window.externalControl.goHome())</script></body>
</html>
