name: Build and release Fedora TV RPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-rpm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install RPM build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm install

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Ошибка: package.json содержит версию $PACKAGE_VERSION, а тег — $GITHUB_REF_NAME"
            exit 1
          fi

      - name: Build RPM
        run: npm run build:rpm

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --title "Fedora TV ${GITHUB_REF_NAME#v}" --generate-notes
          fi
          gh release upload "$GITHUB_REF_NAME" dist/*.rpm --clobber

      - name: Upload RPM as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fedora-tv-rpm
          path: dist/*.rpm
          if-no-files-found: error
