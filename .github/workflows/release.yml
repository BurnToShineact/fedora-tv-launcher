name: Build and release RPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-rpm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install RPM build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm install

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          echo "package.json: $PACKAGE_VERSION"
          echo "Git tag:      $TAG_VERSION"

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Версия package.json не совпадает с тегом"
            exit 1
          fi

      - name: Build and publish RPM with update metadata
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:rpm -- --publish always

      - name: Build RPM without publishing
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build:rpm -- --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-tv-launcher-rpm
          path: |
            dist/*.rpm
            dist/latest-linux.yml
          if-no-files-found: error
