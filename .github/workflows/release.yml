name: Build and release RPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript
        run: npm run check

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

      - name: Build and publish RPM with update metadata
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release:github

      - name: Build RPM without publishing
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build:rpm -- --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-tv-os-rpm
          path: |
            dist/*.rpm
            dist/latest-linux.yml
          if-no-files-found: error
