name: Build and release RPM

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-rpm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install RPM tools
        run: sudo apt-get update && sudo apt-get install -y rpm shellcheck

      - name: Install dependencies
        run: npm ci

      - name: Run stability checks
        run: |
          npm run verify
          npm run audit:prod
          shellcheck --severity=error packaging/*.sh scripts/*.sh session/fedora-tv-os-home session/fedora-tv-os-logout session/fedora-tv-os-session session/fedora-tv-os-startup session/fedora-tv-os-system-settings

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PACKAGE_VERSION" = "$TAG_VERSION"

      - name: Build RPM
        if: startsWith(github.ref, 'refs/tags/')
        run: npm run release:github

      - name: Verify RPM identity and payload
        if: startsWith(github.ref, 'refs/tags/')
        run: bash scripts/verify-rpm.sh

      - name: Sign RPM and refresh update metadata
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RPM_SIGNING_PRIVATE_KEY: ${{ secrets.RPM_SIGNING_PRIVATE_KEY }}
        run: |
          test -n "$RPM_SIGNING_PRIVATE_KEY"
          export GNUPGHOME="$RUNNER_TEMP/fedora-tv-os-gnupg"
          install -d -m 0700 "$GNUPGHOME"
          printf '%s' "$RPM_SIGNING_PRIVATE_KEY" | gpg --batch --import
          KEY_FINGERPRINT=$(gpg --batch --with-colons --list-secret-keys | awk -F: '$1 == "fpr" { print $10; exit }')
          test -n "$KEY_FINGERPRINT"
          rpmsign --define "_gpg_name $KEY_FINGERPRINT" --define "_gpg_path $GNUPGHOME" --addsign dist/*.rpm
          VERIFY_DB="$RUNNER_TEMP/fedora-tv-os-rpmdb"
          install -d -m 0700 "$VERIFY_DB"
          rpmkeys --dbpath "$VERIFY_DB" --import packaging/fedora-tv-os-release.asc
          rpmkeys --dbpath "$VERIFY_DB" --checksig --verbose dist/*.rpm | tee /tmp/rpm-signature.txt
          grep -qi 'Signature.*: OK' /tmp/rpm-signature.txt
          npm run release:metadata

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.rpm dist/latest-linux.yml --verify-tag --generate-notes

      - name: Build RPM without publishing
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: npm run build:rpm -- --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fedora-tv-os-rpm
          path: |
            dist/*.rpm
            dist/latest-linux.yml
          if-no-files-found: error
